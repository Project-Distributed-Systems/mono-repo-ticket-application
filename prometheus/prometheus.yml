global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'event-service-1'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['event-service=1:8080']

  - job_name: 'event-service-2'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['event-service=2:8080']

  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['order-service:8081']

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8082']