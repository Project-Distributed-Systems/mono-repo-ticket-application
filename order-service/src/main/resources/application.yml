server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:tickets}
    username: ${DB_USER:tickets}
    password: ${DB_PASS:tickets}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:tickets}
    password: ${RABBITMQ_PASS:tickets}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export: 
        enabled: true

event-service:
  url: ${EVENT_SERVICE_URL:http://localhost:8080}

reservation:
  ttl-minutes: 15