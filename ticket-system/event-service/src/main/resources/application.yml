server:
  port: 8080

spring:
  application:
    name: event-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:tickets}
    username: ${DB_USER:tickets}
    password: ${DB_PASS:tickets}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:tickets}
    password: ${RABBITMQ_PASS:tickets}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true