server:
  port: 8000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: event-service
          uri: http://nginx-lb:8080      # routes to the LB, not a single instance
          predicates:
            - Path=/events/**,/whoami

        - id: order-service
          uri: http://order-service:8081
          predicates:
            - Path=/orders/**,/users/**

        - id: notification-service
          uri: http://notification-service:8082
          predicates:
            - Path=/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus