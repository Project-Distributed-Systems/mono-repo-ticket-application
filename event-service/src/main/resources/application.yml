server:
  port: 8080

spring:
  application:
    name: event-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:tickets}
    username: ${DB_USER:tickets}
    password: ${DB_PASS:tickets}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:tickets}
    password: ${RABBITMQ_PASS:tickets}
  jpa:
    hibernate:
      ddl-auto: create-drop   # creates schema on start, drops on stop
    show-sql: true            # logs every query to see the UPDATE fire
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export: 
        enabled: true
      distribution:
        percentiles-histogram:
          http.server.requests: true