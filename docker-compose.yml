
networks:
  tickets-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: tickets
      POSTGRES_USER: tickets
      POSTGRES_PASSWORD: tickets
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tickets-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets -d tickets"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: tickets
      RABBITMQ_DEFAULT_PASS: tickets
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "15672:15672"   # management UI, open this in the browser
    networks:
      - tickets-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  event-service-1:
    build:
      context: ./event-service
      dockerfile: Dockerfile
    container_name: event-service-1
    environment:
      DB_HOST: postgres
      DB_NAME: tickets
      DB_USER: tickets
      DB_PASS: tickets
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: tickets
      RABBITMQ_PASS: tickets
      INSTANCE_ID: event-service-1
    networks:
      - tickets-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s    # Spring Boot needs time to start before healthchecks begin firing

  event-service-2:
    build:
      context: ./event-service
      dockerfile: Dockerfile
    container_name: event-service-2
    environment:
      DB_HOST: postgres
      DB_NAME: tickets
      DB_USER: tickets
      DB_PASS: tickets
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: tickets
      RABBITMQ_PASS: tickets
      INSTANCE_ID: event-service-2
    networks:
      - tickets-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  nginx-lb:
    image: nginx:alpine
    container_name: nginx-lb
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - tickets-net
    depends_on:
      event-service-1:
        condition: service_healthy
      event-service-2:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - tickets-net
    depends_on:
      nginx-lb:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/provisioning:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - tickets-net
    depends_on:
      - prometheus

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      DB_HOST: postgres
      DB_NAME: tickets
      DB_USER: tickets
      DB_PASS: tickets
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: tickets
      RABBITMQ_PASS: tickets
      EVENT_SERVICE_URL: http://nginx-lb:8080
      PAYMENT_GATEWAY_URL: http://payment-gateway-mock:8090
    ports:
      - "8081:8081"
    networks:
      - tickets-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nginx-lb:
        condition: service_started   # nginx has no healthcheck, so service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  payment-gateway-mock:
    build:
      context: ./payment-gateway-mock
      dockerfile: Dockerfile
    container_name: payment-gateway-mock
    ports:
      - "8090:8090"
    networks:
      - tickets-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/admin/mode || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  notification-service:
      build:
        context: ./notification-service
        dockerfile: Dockerfile
      container_name: notification-service
      environment:
        DB_HOST: postgres
        DB_NAME: tickets
        DB_USER: tickets
        DB_PASS: tickets
        RABBITMQ_HOST: rabbitmq
        RABBITMQ_USER: tickets
        RABBITMQ_PASS: tickets
      ports:
        - "8082:8082"
      networks:
        - tickets-net
      depends_on:
        postgres:
          condition: service_healthy
        rabbitmq:
          condition: service_healthy
      healthcheck:
        test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 40s

  api-gateway:
      build:
        context: ./api-gateway
        dockerfile: Dockerfile
      container_name: api-gateway
      ports:
        - "8000:8000"
      networks:
        - tickets-net
      depends_on:
        - nginx-lb
        - order-service
        - notification-service